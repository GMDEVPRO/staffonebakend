spring:
  application:
    name: staffone-api
  profiles:
    active: dev
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# JWT e compliance definidos aqui — disponíveis em TODOS os perfis
staffone:
  jwt:
    secret: staffone-dev-secret-key-256bits-minimum-length-here-padded
    expiration-ms: 3600000
  compliance:
    yaml-path: classpath:compliance/

logging:
  level:
    com.staffone: DEBUG
    org.springframework.security: WARN
    org.flywaydb: INFO
