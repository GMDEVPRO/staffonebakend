# ── Profil DEV — H2 in-memory ────────────────────────────────────
# H2 Console : http://localhost:8080/h2-console
# JDBC URL   : jdbc:h2:mem:staffonedb

spring:
  datasource:
    url: jdbc:h2:mem:staffonedb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  flyway:
    locations: classpath:db/migration

logging:
  level:
    com.staffone: DEBUG
    org.hibernate.SQL: DEBUG